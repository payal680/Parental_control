<!DOCTYPE html>
<html>
<head>
    <title>Child Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='child_dashboard.css') }}">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div>
        <section class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
            
        </section>
        <h2>Parent Panel</h2>
        </div>
        <ul>
            <li><a href="#">Dashboard</a></li>
            <li><a href="/assign_task_page">Set Tasks</a></li>
            <li><a href="#">Progress</a></li>
            <li><a href="#">Credits</a></li>
            <li><a href="/logout">Logout</a></li>
        </ul>
    </div>
    <div class="top-bar">
        <ul>
    <img src="{{ url_for('static', filename='logo.png') }}" 
         alt="Profile" 
         class="profile-icon"
         onclick="openSidebar()">
    </div>
    <!-- Main Content -->
    <div class="main-content" id="main-content">

        <!-- Welcome Section -->
        <div class="welcome-card">
            <h1>Welcome, {{ session['fullname'] }}</h1>
            <p>Set tasks for your children and track their progress.</p>
        </div>
        <div class="parent-dashboard">
        <div class="card">

<h2>Child Screen Usage</h2>

<canvas id="screenChart"></canvas>

</div>


<!-- SMART MESSAGE CARD -->

<div class="message-card" id="parentMessage">

<div class="msg-icon">📊</div>

<div class="msg-content">

<h3 id="messageTitle"></h3>

<div class="message-box" id="messageBox"></div>

</div>

</div>


<!-- APP LIMIT MANAGEMENT -->

<div class="card">

<h2>Manage App Usage</h2>

<table id="appsTable">

<tr>
<th>App</th>
<th>Limit</th>
<th>Action</th>
</tr>

</table>

</div>


</div>


<!-- LIMIT MODAL -->

<div class="modal" id="limitModal">

<div class="modal-content">

<h3>Set Screen Time Limit</h3>

<input type="number" id="limitInput" placeholder="Enter minutes">

<button onclick="saveLimit()">Save</button>

</div>

</div>
    
    
</div>
    </div>
</div>
<script>
function openSidebar() {
    document.getElementById("sidebar").classList.add("active");
    document.getElementById("main-content").classList.add("shift");
}

document.addEventListener("click", function(event) {
    const sidebar = document.getElementById("sidebar");
    const icon = document.querySelector(".profile-icon");
    const mainContent = document.getElementById("main-content");

    if (
        sidebar.classList.contains("active") &&
        !sidebar.contains(event.target) &&
        !icon.contains(event.target)
    ) {
        sidebar.classList.remove("active");
        mainContent.classList.remove("shift");
    }
});
</script>

</body>
</html>
